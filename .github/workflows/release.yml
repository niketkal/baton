name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test
      - run: pnpm --filter @baton/conformance test
      - run: pnpm changeset publish --provenance
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'packages/*/dist/**/*'
